<!DOCTYPE html>
<html>
<head>
    <title>Configuraciones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Configuraciones</h1>

    <h2>Dosis</h2>
    <form action="/guardar_dosis" method="post">
        <label for="dosis">Dosis [ml/100Lagua]:</label><br>
        <input type="number" name="dosis" id="dosis" value="{{DOSIS}}"><br><br>
        <input type="submit" value="Guardar">
    </form>

    <h2>Caudalímetros</h2>
    <form action="/guardar_k" method="post">
        <label for="k_agua">Constante caudalímetro agua:</label><br>
        <input type="number" name="k_agua" id="k_agua" value="{{K_AGUA}}"><br><br>

        <label for="k_remedio">Constante caudalímetro remedio:</label><br>
        <input type="number" name="k_remedio" id="k_remedio" value="{{K_REMEDIO}}"><br><br>

        <input type="submit" value="Guardar">
    </form>
</body>
</html>
